version: 1
applications:
  - appRoot: ecommerceapp
    frontend:
      phases:
        preBuild:
          commands:
            - pwd
            - ls
            - echo "---- package.json ----"
            - cat package.json
            - echo "---- scripts ----"
            - node -e "console.log(require('./package.json').scripts)"
            - npm ci || npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*